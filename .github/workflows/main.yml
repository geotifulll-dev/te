name: FORCE_RUN_AUTOWINI

on:
  workflow_dispatch: 

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Project Dependencies
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth axios

      - name: Install Chrome and System Dependencies
        # ეს ბრძანება ავტომატურად პოულობს და აინსტალირებს ყველა საჭირო პაკეტს (მათ შორის libasound-ს)
        run: npx puppeteer browsers install chrome --install-deps

      - name: Final Launch
        run: xvfb-run --server-args="-screen 0 1920x1080x24" node scraper.js
