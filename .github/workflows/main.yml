name: Autowini & Aversi Scraper

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: 

jobs:
  run-scraper:
    # ვაფიქსირებთ 22.04-ზე, რომ Noble (24.04) პაკეტების დასახელებებმა არ დაგვაბნიოს
    runs-on: ubuntu-22.04
    
    steps:
    - name: Get Scraper Code
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Browser Dependencies
      # Google Chrome-ის ინსტალაცია თავისით აყენებს ყველა საჭირო lib-ს
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install Node Packages
      run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth axios
      
    - name: Run Scraper
      run: node scraper.js