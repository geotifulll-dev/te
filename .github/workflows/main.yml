name: FORCE_RUN_AUTOWINI

on:
  workflow_dispatch: 

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget gnupg libnss3 libatk-bridge2.0-0 libgtk-3-0 libasound2 xvfb

      - name: Install Puppeteer
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth axios

      - name: Final Launch
        run: xvfb-run --server-args="-screen 0 1920x1080x24" node scraper.js
