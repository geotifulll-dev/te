name: FORCE_RUN_AUTOWINI

on:
  workflow_dispatch: 

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install puppeteer-extra puppeteer-extra-plugin-stealth axios puppeteer

      - name: Install Chrome and OS Deps
        # ეს ბრძანება ავტომატურად აინსტალირებს ყველაფერს რაც Puppeteer-ს სჭირდება Linux-ზე
        run: npx puppeteer browsers install chrome --install-deps

      - name: Run Scraper
        # XVFB საჭიროა ბრაუზერის ვირტუალურ მონიტორზე გასაშვებად
        run: xvfb-run --server-args="-screen 0 1920x1080x24" node scraper.js
