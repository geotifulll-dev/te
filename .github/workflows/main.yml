name: KIA

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: 

jobs:
  run-scraper:
    # ვიყენებთ 22.04 ვერსიას სტაბილურობისთვის
    runs-on: ubuntu-22.04
    
    steps:
    - name: Get Scraper Code
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Puppeteer Dependencies
      # ეს ნაბიჯი აუცილებელია, რომ Linux-მა Puppeteer-ის ბრაუზერი გაუშვას
      run: |
        sudo apt-get update
        sudo apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0 libasound2 libxss1

    - name: Install Node Packages
      run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth axios
      
    - name: Run Magic Script
      run: node scraper.js