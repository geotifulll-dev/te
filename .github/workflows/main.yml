name: FORCE_RUN_AUTOWINI

on:
  workflow_dispatch: 

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install NPM Dependencies
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth axios

      - name: Install Browser and Deps
        # ეს ავტომატურად დააყენებს libasound2t64-საც და xvfb-საც თუ საჭიროა
        run: npx puppeteer browsers install chrome --install-deps

      - name: Run Scraper
        run: xvfb-run --server-args="-screen 0 1920x1080x24" node scraper.js
