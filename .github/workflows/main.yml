name: Aversi Price Scraper

on:
  schedule:
    # 0 */2 * * * ნიშნავს 2 საათში ერთხელ. დღეში იქნება 12 გაშვება ავტომატურად.
    - cron: "0 */2 * * *"
  workflow_dispatch: 
    # ეს დაგვეხმარება მექანიკურადაც გავუშვათ ხოლმე ღილაკის დაჭერით მოსასინჯად

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
    - name: Get Scraper Code
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Node Packages
      run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth axios
      
    - name: Run Magic Script
      run: node scraper.js
